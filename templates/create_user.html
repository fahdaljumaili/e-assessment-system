{% extends 'base.html' %}
{% block title %}Add User{% endblock %}
{% block content %}
  <h2 class="mb-4">Add User</h2>

  <form method="POST" class="col-md-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required placeholder="e.g. student42">
    </div>

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-control" placeholder="Optional">
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required minlength="4" placeholder="At least 4 characters">
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select name="role" class="form-select" required>
        {% for role in roles %}
          <option value="{{ role }}">{{ role|capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success">Create User</button>
      <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
