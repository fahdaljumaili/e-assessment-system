{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
  <h2 class="mb-4">Edit User: {{ user.username }}</h2>

  <form method="POST" class="col-md-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required value="{{ user.username }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}">
    </div>

    <div class="mb-3">
      <label class="form-label">New Password</label>
      <input type="password" name="password" class="form-control" minlength="4" placeholder="Leave blank to keep current">
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select name="role" class="form-select" required>
        {% for role in roles %}
          <option value="{{ role }}" {% if user.role == role %}selected{% endif %}>{{ role|capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
