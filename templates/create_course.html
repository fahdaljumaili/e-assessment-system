{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block content %}
  <h2 class="mb-4">Create Course</h2>
  <form method="POST" class="col-md-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">Course Title</label>
      <input type="text" name="title" class="form-control" required placeholder="e.g. Introduction to Programming">
    </div>
    <div class="mb-3">
      <label class="form-label">Course Code</label>
      <input type="text" name="code" class="form-control" required placeholder="e.g. CS101">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success">Create</button>
      <a href="{{ url_for('courses.list_courses') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
